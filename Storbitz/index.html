<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Storbitz</title><style>*{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#050713;color:#eef4ff;font:14px system-ui}canvas{width:100%;height:100%;touch-action:none}.hud{position:fixed;inset:0;pointer-events:none}.top{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;gap:10px}.card{background:#0d132dcc;border:1px solid #ffffff22;border-radius:12px;padding:9px 12px;min-width:130px}.title{text-align:center}.bar{height:8px;background:#ffffff18;border-radius:9px;overflow:hidden;margin-top:5px}.fill{height:100%;background:#57d7ff}.enemy .fill{background:#ff6c8f}.help{position:absolute;left:10px;bottom:10px;background:#0d132dcc;border:1px solid #ffffff22;border-radius:12px;padding:9px;max-width:420px}.msg{position:absolute;left:50%;bottom:80px;transform:translateX(-50%);background:#0d132ddd;border:1px solid #ffffff22;border-radius:20px;padding:7px 12px;white-space:nowrap}.buttons{position:absolute;right:10px;bottom:10px;pointer-events:auto}button{background:#ffffff14;color:#fff;border:1px solid #ffffff22;border-radius:9px;padding:10px 12px}@media(max-width:650px){.help{max-width:70%;font-size:11px}.title{display:none}}</style></head><body><canvas id="c"></canvas><div class="hud"><div class="top"><div class="card">YOU <span id="ph">100</span><div class="bar"><div id="pf" class="fill"></div></div></div><div class="card title"><b>STORBITZ</b><br><small>Gravity decides the weapon</small></div><div class="card enemy">ENEMY <span id="eh">100</span><div class="bar"><div id="ef" class="fill"></div></div></div></div><div class="help">Touch the blue planet, drag in the launch direction, then release. A collision deals impact damage. A stable enemy orbit deals damage over time.</div><div id="msg" class="msg">Drag from your planet to launch</div><div class="buttons"><button id="reset">Restart</button></div></div><script>(()=>{'use strict';const C=document.getElementById('c'),X=C.getContext('2d'),W=1200,H=700,DT=1/120,P=[{x:250,y:390,r:48,mu:1650000,h:100,col:'#57d7ff'},{x:950,y:310,r:48,mu:1650000,h:100,col:'#ff6c8f'}];let S=[],drag=0,d={x:0,y:0},last=performance.now(),acc=0,ai=2,over=0,sc=1,ox=0,oy=0,stars=[];for(let i=0;i<160;i++)stars.push([Math.random()*W,Math.random()*H,Math.random()*1.5+.3]);function resize(){let q=Math.min(devicePixelRatio||1,2);C.width=innerWidth*q;C.height=innerHeight*q;sc=Math.min(innerWidth/W,innerHeight/H);ox=(innerWidth-W*sc)/2;oy=(innerHeight-H*sc)/2;C.q=q}onresize=resize;resize();function world(e){return{x:(e.clientX-ox)/sc,y:(e.clientY-oy)/sc}}function g(x,y){let ax=0,ay=0;for(const p of P){let dx=p.x-x,dy=p.y-y,r2=Math.max(dx*dx+dy*dy,(p.r*.55)**2),z=p.mu/Math.pow(r2,1.5);ax+=dx*z;ay+=dy*z}return[ax,ay]}function step(b,dt){let a=g(b.x,b.y);b.vx+=a[0]*dt;b.vy+=a[1]*dt;b.x+=b.vx*dt;b.y+=b.vy*dt}function orbit(b,p){let x=b.x-p.x,y=b.y-p.y,r=Math.hypot(x,y),v2=b.vx*b.vx+b.vy*b.vy,E=v2/2-p.mu/r,h=x*b.vy-y*b.vx;if(E>=0)return 0;let e=Math.sqrt(Math.max(0,1+2*E*h*h/(p.mu*p.mu))),a=-p.mu/(2*E),rp=a*(1-e),ra=a*(1+e);return rp>p.r+5&&ra<230&&r<235}function launch(o,vx,vy){let p=P[o],l=Math.hypot(vx,vy)||1;S.push({o,x:p.x+vx/l*(p.r+9),y:p.y+vy/l*(p.r+9),vx,vy,age:0,stable:0,tick:0,trail:[]})}function fire(o,t){let p=P[o],dx=t.x-p.x,dy=t.y-p.y,l=Math.hypot(dx,dy)||1,v=75+Math.min(l,230)*1.35;launch(o,dx/l*v,dy/l*v)}function damage(i,n,text){P[i].h=Math.max(0,P[i].h-n);msg.textContent=text;if(P[i].h<=0&&!over){over=1;setTimeout(()=>alert(i?'Victory!':'Defeat!'),30)}}function sim(o,vx,vy){let p=P[o],l=Math.hypot(vx,vy),b={x:p.x+vx/l*(p.r+9),y:p.y+vy/l*(p.r+9),vx,vy},e=P[1-o],m=1e9;for(let i=0;i<380;i++){step(b,1/60);let q=Math.hypot(b.x-e.x,b.y-e.y);m=Math.min(m,q);if(q<e.r+5)return 2000-i;if(i>60&&orbit(b,e))return 1300-i}return 400-m}function aiFire(){let p=P[1],t=P[0],base=Math.atan2(t.y-p.y,t.x-p.x),best={s:-1e9};for(let i=0;i<44;i++){let a=base+(Math.random()-.5)*2.6,v=100+Math.random()*280,vx=Math.cos(a)*v,vy=Math.sin(a)*v,s=sim(1,vx,vy);if(s>best.s)best={s,vx,vy}}launch(1,best.vx,best.vy);ai=2.8+Math.random()*2}function update(){if(over)return;ai-=DT;if(ai<0)aiFire();for(const s of S){s.age+=DT;step(s,DT);if((s.age*15|0)%2===0){s.trail.push([s.x,s.y,1]);if(s.trail.length>25)s.trail.shift()}for(const q of s.trail)q[2]-=DT*2;for(let i=0;i<2;i++){let p=P[i];if(Math.hypot(s.x-p.x,s.y-p.y)<p.r+5){let hostile=s.o!==i,sp=Math.hypot(s.vx,s.vy);if(hostile)damage(i,Math.min(24,7+sp*.04),'Impact damage');else if(s.age>.3)damage(i,3,'Self impact');s.dead=1}}let e=1-s.o;if(orbit(s,P[e])){s.stable+=DT;if(s.stable>.65){s.tick+=DT;if(s.tick>.45){s.tick=0;damage(e,.8,'Orbital damage')}}}else s.stable=Math.max(0,s.stable-DT*2);if(s.age>22||s.x<-250||s.x>W+250||s.y<-250||s.y>H+250)s.dead=1}for(let i=0;i<S.length;i++)for(let j=i+1;j<S.length;j++){let a=S[i],b=S[j];if(!a.dead&&!b.dead&&a.o!==b.o&&Math.hypot(a.x-b.x,a.y-b.y)<12)a.dead=b.dead=1}S=S.filter(s=>!s.dead);ph.textContent=Math.ceil(P[0].h);eh.textContent=Math.ceil(P[1].h);pf.style.width=P[0].h+'%';ef.style.width=P[1].h+'%'}function planet(p){let gr=X.createRadialGradient(p.x-15,p.y-18,5,p.x,p.y,p.r);gr.addColorStop(0,'#fff');gr.addColorStop(.18,p.col);gr.addColorStop(1,'#18265a');X.fillStyle=gr;X.beginPath();X.arc(p.x,p.y,p.r,0,7);X.fill();X.globalAlpha=.2;X.strokeStyle=p.col;for(const r of[90,135,185]){X.beginPath();X.arc(p.x,p.y,r,0,7);X.stroke()}X.globalAlpha=1}function preview(){if(!drag)return;let p=P[0],dx=d.x-p.x,dy=d.y-p.y,l=Math.hypot(dx,dy)||1,v=75+Math.min(l,230)*1.35,b={x:p.x+dx/l*(p.r+9),y:p.y+dy/l*(p.r+9),vx:dx/l*v,vy:dy/l*v};X.setLineDash([3,9]);X.strokeStyle='#57d7ffaa';X.beginPath();for(let i=0;i<420;i++){step(b,1/60);if(i%7===0)X.lineTo(b.x,b.y)}X.stroke();X.setLineDash([]);msg.textContent='Launch speed '+Math.round(v)}function draw(){X.setTransform(C.q*sc,0,0,C.q*sc,C.q*ox,C.q*oy);X.fillStyle='#050713';X.fillRect(0,0,W,H);X.fillStyle='#dfe9ff';for(const s of stars){X.globalAlpha=.2+s[2]/2;X.beginPath();X.arc(s[0],s[1],s[2],0,7);X.fill()}X.globalAlpha=1;planet(P[0]);planet(P[1]);preview();for(const s of S){X.strokeStyle=s.o?'#ff6c8f55':'#57d7ff55';X.beginPath();for(const q of s.trail)X.lineTo(q[0],q[1]);X.stroke();X.fillStyle=s.o?'#ffcada':'#dff8ff';X.beginPath();X.arc(s.x,s.y,5,0,7);X.fill()} }function loop(t){acc+=Math.min(.05,(t-last)/1000);last=t;while(acc>=DT){update();acc-=DT}draw();requestAnimationFrame(loop)}C.onpointerdown=e=>{let q=world(e),p=P[0];if(Math.hypot(q.x-p.x,q.y-p.y)<p.r+30){drag=1;d=q;C.setPointerCapture(e.pointerId)}};C.onpointermove=e=>{if(drag)d=world(e)};C.onpointerup=e=>{if(drag){drag=0;let q=world(e);if(Math.hypot(q.x-P[0].x,q.y-P[0].y)>18)fire(0,q);msg.textContent='Drag from your planet to launch'}};reset.onclick=()=>{S=[];P[0].h=P[1].h=100;ai=2;over=0;msg.textContent='New battle'};requestAnimationFrame(loop)})();</script></body></html>
